<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinesh Bhairoju — AI Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#8a63f9;
  --accent2:#9b5dff;
}

body{
  margin:0;
  font-family:Poppins;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:18px 30px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(10px);
  z-index:10;
}
.logo{
  font-weight:800;
  font-size:20px;
}
.logo span{color:var(--accent)}
nav a{
  color:#fff;
  margin-left:20px;
  text-decoration:none;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}
h1 span{color:var(--accent)}
.cta{
  padding:12px 25px;
  border-radius:30px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  text-decoration:none;
  color:#fff;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  background:rgba(255,255,255,.05);
  border-top:1px solid rgba(255,255,255,.1);
}

/* CHATBOT */
#chatbot{
  position:fixed;
  bottom:20px;
  right:20px;
  width:300px;
  background:rgba(0,0,0,.9);
  border-radius:18px;
  border:1px solid rgba(255,255,255,.2);
  overflow:hidden;
}
#chat-header{
  padding:12px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  font-weight:600;
  display:flex;
  align-items:center;
  gap:8px;
}
#chat-body{
  height:200px;
  overflow-y:auto;
  padding:10px;
  font-size:14px;
}
.msg-user{color:#ccc;margin:5px 0;}
.msg-bot{color:#9b5dff;margin:5px 0;}
#chat-input{
  width:100%;
  padding:10px;
  border:none;
  background:#111;
  color:#fff;
}

/* VOICE BUTTON */
#voiceBtn{
  position:fixed;
  bottom:20px;
  left:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  border:none;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:#fff;
  font-size:24px;
  cursor:pointer;
  box-shadow:0 0 25px rgba(155,93,255,.7);
}
#voiceBtn:active{
  transform:scale(1.1);
}

/* CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>

<body>

<header>
  <div class="logo">Dinesh<span>•</span>Bhairoju</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Projects</a>
    <a href="#">Contact</a>
  </nav>
</header>

<canvas id="bg"></canvas>

<section class="hero">
  <h1>Hi, I'm <span>Dinesh Bhairoju</span></h1>
  <p>AI + Digital Marketing + Ecommerce Specialist</p>
  <a href="#" class="cta">Explore</a>
</section>

<!-- CHAT -->
<div id="chatbot">
  <div id="chat-header">🤖 AI Assistant</div>
  <div id="chat-body"></div>
  <input id="chat-input" placeholder="Ask me anything...">
</div>

<!-- VOICE -->
<button id="voiceBtn">🎤</button>

<footer>
  © 2026 Dinesh Bhairoju • Built with AI 🚀
</footer>

<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>

<script>
/* 3D */
const canvas = document.getElementById('bg');
const renderer = new THREE.WebGLRenderer({canvas});
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 5;

const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1.5,64,64),
  new THREE.MeshStandardMaterial({color:0x8a63f9})
);
scene.add(earth);

const light = new THREE.PointLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

function animate(){
  requestAnimationFrame(animate);
  earth.rotation.y+=0.01;
  renderer.render(scene,camera);
}
animate();

/* CHAT */
const input = document.getElementById("chat-input");
const body = document.getElementById("chat-body");

async function sendMessage(msg){
  body.innerHTML += `<div class="msg-user">👤 ${msg}</div>`;

  try{
    const res = await fetch("https://your-backend.onrender.com/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({message: msg})
    });

    const data = await res.json();

    body.innerHTML += `<div class="msg-bot">🤖 ${data.reply}</div>`;
    speak(data.reply);

  }catch{
    body.innerHTML += `<div class="msg-bot">⚠️ AI not connected</div>`;
  }

  body.scrollTop = body.scrollHeight;
}

input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    sendMessage(input.value);
    input.value="";
  }
});

/* VOICE */
function speak(text){
  const speech = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(speech);
}

document.getElementById("voiceBtn").onclick=()=>{
  const recognition = new (window.SpeechRecognition||window.webkitSpeechRecognition)();

  recognition.onresult = (event)=>{
    const text = event.results[0][0].transcript;
    sendMessage(text);
  };

  recognition.start();
};
</script>

</body>
</html>
