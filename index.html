<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinesh Bhairoju</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#8a63f9;
  --accent2:#9b5dff;
}

body{
  margin:0;
  font-family:Poppins;
  background:#000;
  color:#fff;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:20px;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(10px);
  z-index:10;
  font-weight:800;
}
header span{color:var(--accent)}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid var(--accent);
  margin-bottom:15px;
  box-shadow:0 0 25px rgba(155,93,255,.7);
}

.hero h1{font-size:32px}
.hero p{color:#aaa}

/* SOCIAL */
.social{
  margin-top:15px;
  display:flex;
  gap:10px;
}
.social a{
  padding:10px 15px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  color:#fff;
  text-decoration:none;
  transition:.3s;
}
.social a:hover{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}

/* SECTION */
.section{
  padding:60px 20px;
  text-align:center;
}
.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}
.card{
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  transition:.3s;
}
.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(155,93,255,.6);
}

/* VISITOR */
#visitors{
  text-align:center;
  padding:20px;
  color:#aaa;
}

/* AI BUTTON */
#aiBtn{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  width:70px;
  height:70px;
  border-radius:50%;
  border:none;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:#fff;
  font-size:18px;
  cursor:pointer;
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(155,93,255,.7)}
  70%{box-shadow:0 0 0 25px rgba(155,93,255,0)}
  100%{box-shadow:0 0 0 0 rgba(155,93,255,0)}
}

/* CHAT */
#chatbox{
  position:fixed;
  bottom:110px;
  right:20px;
  width:320px;
  height:450px;
  display:none;
  flex-direction:column;
  background:rgba(0,0,0,.8);
  backdrop-filter:blur(20px);
  border-radius:20px;
}

.chat-header{
  padding:12px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  display:flex;
  justify-content:space-between;
}

#chat-body{
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.user{
  background:#111;
  padding:10px;
  border-radius:10px;
  margin:5px 0;
}
.bot{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  padding:10px;
  border-radius:10px;
  margin:5px 0;
}

/* INPUT */
.chat-input-box{
  display:flex;
}
#chat-input{
  flex:1;
  padding:10px;
  background:#000;
  border:none;
  color:#fff;
}
#sendBtn{
  width:60px;
  background:var(--accent);
  border:none;
  color:#fff;
}

/* SUGGEST */
.suggest{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  padding:5px;
}
.suggest button{
  background:#111;
  border:none;
  color:#fff;
  padding:6px 10px;
  border-radius:20px;
}
</style>
</head>

<body>

<header>Dinesh<span>•</span>Bhairoju</header>

<section class="hero">
  <img src="https://i.pravatar.cc/150" class="profile">
  <!-- replace above link with your real photo later -->

  <h1>Hi, I'm Dinesh Bhairoju</h1>
  <p>AI • Digital Marketing • Ecommerce</p>

  <div class="social">
    <a href="https://youtube.com/@dineshbhairoju" target="_blank">YouTube</a>
    <a href="https://www.linkedin.com/in/dineshbhairoju" target="_blank">LinkedIn</a>
  </div>
</section>

<section class="section">
  <h2>Skills</h2>
  <div class="cards">
    <div class="card">AI</div>
    <div class="card">Marketing</div>
    <div class="card">Ecommerce</div>
  </div>
</section>

<section class="section">
  <h2>Projects</h2>
  <div class="cards">
    <div class="card">AI Assistant</div>
    <div class="card">Automation Tools</div>
  </div>
</section>

<div id="visitors">Visitors: <span id="count">0</span></div>

<button id="aiBtn">AI</button>

<!-- CHAT -->
<div id="chatbox">
  <div class="chat-header">
    Dinesh AI
    <span onclick="chatbox.style.display='none'">✖</span>
  </div>

  <div id="chat-body"></div>

  <div class="suggest">
    <button onclick="sendMessage('skills')">Skills</button>
    <button onclick="sendMessage('education')">Education</button>
    <button onclick="sendMessage('resume')">Resume</button>
    <button onclick="sendMessage('email')">Email</button>
  </div>

  <div class="chat-input-box">
    <input id="chat-input" placeholder="Ask me anything...">
    <button id="sendBtn">➤</button>
  </div>
</div>

<script>
const chatbox=document.getElementById("chatbox");
const body=document.getElementById("chat-body");
const input=document.getElementById("chat-input");

document.getElementById("aiBtn").onclick=()=>chatbox.style.display="flex";

function sendMessage(msg){
 if(!msg)return;

 body.innerHTML+=`<div class="user">${msg}</div>`;

 let reply=getReply(msg);

 let botDiv=document.createElement("div");
 botDiv.className="bot";
 body.appendChild(botDiv);

 let i=0;
 let typing=setInterval(()=>{
  botDiv.textContent+=reply[i];
  i++;
  if(i>=reply.length)clearInterval(typing);
 },20);

 speak(reply);
 body.scrollTop=body.scrollHeight;
 input.value="";
}

function getReply(msg){
 msg=msg.toLowerCase();

 if(msg.includes("skills"))
 return "AI, Digital Marketing, Ecommerce, Web Development";

 if(msg.includes("education"))
 return "Add your education here";

 if(msg.includes("resume"))
 return "Add your resume link here";

 if(msg.includes("email"))
 return "your@email.com";

 return "Tell me more!";
}

document.getElementById("sendBtn").onclick=()=>sendMessage(input.value);
input.addEventListener("keydown",(e)=>{
 if(e.key==="Enter")sendMessage(input.value);
});

/* VOICE */
function speak(text){
 let s=new SpeechSynthesisUtterance(text);
 speechSynthesis.speak(s);
}

/* VISITOR COUNT (LOCAL) */
let count=localStorage.getItem("visits") || 0;
count++;
localStorage.setItem("visits",count);
document.getElementById("count").innerText=count;
</script>

</body>
</html>
