<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinesh Bhairoju</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#8a63f9;
  --accent2:#9b5dff;
}

body{
  margin:0;
  font-family:Poppins;
  background:#000;
  color:#fff;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 30px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(10px);
}
.logo{font-weight:800;font-size:22px;}
.logo span{color:var(--accent)}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}
h1 span{
  background:linear-gradient(90deg,#fff,var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* BUTTONS */
.btn{
  position:fixed;
  width:65px;
  height:65px;
  border-radius:50%;
  border:none;
  font-size:22px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 0 25px rgba(155,93,255,.8);
  cursor:pointer;
}
#voiceBtn{left:20px;bottom:20px;}
#chatBtn{right:20px;bottom:20px;}
#aiBtn{
  left:50%;
  transform:translateX(-50%);
  bottom:20px;
}

/* LISTENING EFFECT */
.listening{
  animation:pulse 1s infinite;
}
@keyframes pulse{
  0%{box-shadow:0 0 10px var(--accent)}
  50%{box-shadow:0 0 40px var(--accent2)}
  100%{box-shadow:0 0 10px var(--accent)}
}

/* CHAT */
#chatbox{
  position:fixed;
  bottom:100px;
  right:20px;
  width:320px;
  height:420px;
  display:none;
  flex-direction:column;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(20px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,.2);
}

.chat-header{
  padding:12px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  display:flex;
  justify-content:space-between;
}

#chat-body{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg{
  margin:8px 0;
  padding:10px 14px;
  border-radius:15px;
  max-width:80%;
}

.user{background:#111;margin-left:auto;}
.bot{background:linear-gradient(90deg,var(--accent),var(--accent2));}

/* INPUT */
.chat-input-box{
  display:flex;
  border-top:1px solid #222;
}
#chat-input{
  flex:1;
  padding:12px;
  border:none;
  background:#000;
  color:#fff;
}
#sendBtn{
  width:50px;
  background:var(--accent);
  border:none;
  color:#fff;
  font-size:18px;
}

/* BG */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>

<body>

<header>
  <div class="logo">Dinesh<span>•</span>Bhairoju</div>
</header>

<canvas id="bg"></canvas>

<section class="hero">
  <h1>Hi, I'm <span>Dinesh Bhairoju</span></h1>
</section>

<!-- BUTTONS -->
<button id="voiceBtn" class="btn">🎤</button>
<button id="aiBtn" class="btn">🤖</button>
<button id="chatBtn" class="btn">💬</button>

<!-- CHAT -->
<div id="chatbox">
  <div class="chat-header">
    🤖 Dinesh AI
    <span id="closeChat">✖</span>
  </div>

  <div id="chat-body"></div>

  <div class="chat-input-box">
    <input id="chat-input" placeholder="Ask me anything...">
    <button id="sendBtn">➤</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>

<script>
/* ===== 3D ===== */
const renderer = new THREE.WebGLRenderer({canvas:bg, alpha:true});
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 6;

const sphere = new THREE.Mesh(
  new THREE.SphereGeometry(1.8,64,64),
  new THREE.MeshStandardMaterial({color:0x8a63f9})
);
scene.add(sphere);

const light = new THREE.PointLight(0xffffff,1.2);
light.position.set(5,5,5);
scene.add(light);

function animate(){
  requestAnimationFrame(animate);
  sphere.rotation.y += 0.005;
  renderer.render(scene, camera);
}
animate();

/* ===== CHAT ===== */
const chatBtn = document.getElementById("chatBtn");
const aiBtn = document.getElementById("aiBtn");
const voiceBtn = document.getElementById("voiceBtn");
const chatbox = document.getElementById("chatbox");
const closeChat = document.getElementById("closeChat");
const input = document.getElementById("chat-input");
const body = document.getElementById("chat-body");

chatBtn.onclick = ()=> chatbox.style.display="flex";
closeChat.onclick = ()=> chatbox.style.display="none";

/* ===== ADD MESSAGE ===== */
function addMessage(text, cls){
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

/* ===== SIMPLE AI ===== */
function reply(msg){
  msg = msg.toLowerCase();

  if(msg.includes("hi")) return "Hey 👋 How can I help you?";
  if(msg.includes("who")) return "Dinesh Bhairoju is an AI + Digital Marketing expert 🚀";

  return "That's interesting 👀 tell me more!";
}

/* ===== SEND ===== */
function sendMessage(){
  const msg = input.value;
  if(!msg) return;

  addMessage(msg,"user");
  input.value="";

  setTimeout(()=>{
    const res = reply(msg);
    addMessage(res,"bot");
    speak(res);
  },500);
}

document.getElementById("sendBtn").onclick = sendMessage;

input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter") sendMessage();
});

/* ===== VOICE ===== */
function startVoice(){
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

  voiceBtn.classList.add("listening");

  recognition.onresult = (e)=>{
    const text = e.results[0][0].transcript;
    addMessage(text,"user");

    const res = reply(text);
    addMessage(res,"bot");
    speak(res);

    voiceBtn.classList.remove("listening");
  };

  recognition.onerror = ()=>{
    voiceBtn.classList.remove("listening");
    alert("Mic not allowed or not supported");
  };

  recognition.start();
}

/* BUTTONS */
voiceBtn.onclick = startVoice;

aiBtn.onclick = ()=>{
  chatbox.style.display="flex";
  startVoice(); // opens + listens
};

/* ===== SPEAK ===== */
function speak(text){
  const speech = new SpeechSynthesisUtterance(text);
  speech.rate = 1;
  speechSynthesis.speak(speech);
}

/* ===== INTRO ===== */
window.onload = ()=>{
  addMessage("Hey 👋 I'm Dinesh AI. Ask me anything 🚀","bot");
};
</script>

</body>
</html>
