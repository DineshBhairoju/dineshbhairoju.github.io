<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinesh Bhairoju</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#8a63f9;
  --accent2:#9b5dff;
}

body{
  margin:0;
  font-family:Poppins;
  color:#fff;
  overflow:hidden;

  /* 🔥 PREMIUM BACKGROUND */
  background:
  radial-gradient(circle at 20% 20%, rgba(138,99,249,0.4), transparent 40%),
  radial-gradient(circle at 80% 60%, rgba(155,93,255,0.3), transparent 40%),
  linear-gradient(120deg,#000000,#0b0015,#000000);
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:20px;
  font-weight:800;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(10px);
  z-index:10;
}
header span{color:var(--accent)}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
}

/* 🔥 MOVING LIGHT EFFECT */
.hero::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:radial-gradient(circle, rgba(155,93,255,.4), transparent 60%);
  filter:blur(80px);
  animation:moveLight 8s infinite alternate;
}

@keyframes moveLight{
  0%{transform:translate(-100px,-50px);}
  100%{transform:translate(100px,50px);}
}

/* PROFILE */
.profile{
  width:140px;
  height:140px;
  border-radius:50%;
  border:3px solid var(--accent);
  box-shadow:0 0 40px rgba(155,93,255,.9);
  margin-bottom:20px;
  object-fit:cover;
}

/* TEXT */
.hero h1{
  font-size:36px;
  margin:10px 0;
}
.hero p{
  color:#aaa;
}

/* SOCIAL */
.social{
  margin-top:20px;
  display:flex;
  gap:12px;
}
.social a{
  padding:10px 18px;
  border-radius:25px;
  background:#111;
  color:#fff;
  text-decoration:none;
  transition:.3s;
}
.social a:hover{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transform:scale(1.1);
}

/* 🔥 AI BUTTON */
#aiBtn{
  position:absolute;
  bottom:80px;
  width:80px;
  height:80px;
  border-radius:50%;
  border:none;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:#fff;
  font-size:20px;
  cursor:pointer;

  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(155,93,255,.7)}
  70%{box-shadow:0 0 0 30px rgba(155,93,255,0)}
  100%{box-shadow:0 0 0 0 rgba(155,93,255,0)}
}

/* CHAT */
#chatbox{
  position:fixed;
  bottom:120px;
  right:20px;
  width:320px;
  height:420px;
  display:none;
  flex-direction:column;
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(20px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,.1);
}

.chat-header{
  padding:12px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  display:flex;
  justify-content:space-between;
}

#chat-body{
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.user{
  background:#111;
  padding:10px;
  border-radius:10px;
  margin:5px 0;
}
.bot{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  padding:10px;
  border-radius:10px;
  margin:5px 0;
}

/* INPUT */
.chat-input-box{
  display:flex;
}
#chat-input{
  flex:1;
  padding:10px;
  background:#000;
  border:none;
  color:#fff;
}
#sendBtn{
  width:60px;
  background:var(--accent);
  border:none;
  color:#fff;
}
</style>
</head>

<body>

<header>Dinesh<span>•</span>Bhairoju</header>

<section class="hero">

  <!-- YOUR IMAGE -->
  <img src="dinesh.jpg" class="profile">

  <h1>Hi, I'm Dinesh Bhairoju</h1>
  <p>AI • Digital Marketing • Ecommerce</p>

  <div class="social">
    <a href="https://youtube.com/@dineshbhairoju" target="_blank">YouTube</a>
    <a href="https://www.linkedin.com/in/dineshbhairoju" target="_blank">LinkedIn</a>
  </div>

  <button id="aiBtn">AI</button>

</section>

<!-- CHAT -->
<div id="chatbox">
  <div class="chat-header">
    Dinesh AI
    <span onclick="chatbox.style.display='none'">✖</span>
  </div>

  <div id="chat-body"></div>

  <div class="chat-input-box">
    <input id="chat-input" placeholder="Ask me anything...">
    <button id="sendBtn">➤</button>
  </div>
</div>

<script>
const chatbox=document.getElementById("chatbox");
const body=document.getElementById("chat-body");
const input=document.getElementById("chat-input");

document.getElementById("aiBtn").onclick=()=>chatbox.style.display="flex";

function sendMessage(msg){
 if(!msg)return;

 body.innerHTML+=`<div class="user">${msg}</div>`;

 let reply=getReply(msg);

 let bot=document.createElement("div");
 bot.className="bot";
 body.appendChild(bot);

 let i=0;
 let typing=setInterval(()=>{
  bot.textContent+=reply[i];
  i++;
  if(i>=reply.length)clearInterval(typing);
 },20);

 speak(reply);
 input.value="";
 body.scrollTop=body.scrollHeight;
}

function getReply(msg){
 msg=msg.toLowerCase();

 if(msg.includes("hi")) return "Hello, how can I help you?";
 if(msg.includes("skills")) return "AI, Digital Marketing, Ecommerce";
 if(msg.includes("who")) return "Dinesh Bhairoju is an AI and Digital Marketing specialist.";

 return "Tell me more.";
}

document.getElementById("sendBtn").onclick=()=>sendMessage(input.value);
input.addEventListener("keydown",(e)=>{
 if(e.key==="Enter")sendMessage(input.value);
});

function speak(text){
 let s=new SpeechSynthesisUtterance(text);
 speechSynthesis.speak(s);
}
</script>

</body>
</html>
