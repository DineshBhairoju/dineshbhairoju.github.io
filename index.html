<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinesh Bhairoju</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#8a63f9;
  --accent2:#9b5dff;
}

body{
  margin:0;
  font-family:Poppins;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:20px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(12px);
  z-index:10;
}
.logo{font-weight:800;font-size:20px;}
.logo span{color:var(--accent)}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding-top:80px;
}
h1{
  font-size:48px;
}
h1 span{color:var(--accent)}
p{color:#ccc}

/* CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* CHAT TOGGLE BUTTON */
#chatToggle{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-size:22px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 0 20px rgba(155,93,255,.7);
  z-index:20;
}

/* CHATBOX */
#chatbot{
  position:fixed;
  bottom:90px;
  right:20px;
  width:300px;
  height:380px;
  display:none;
  flex-direction:column;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(20px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,.2);
  overflow:hidden;
  z-index:20;
}
#chat-header{
  padding:10px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}
#chat-body{
  flex:1;
  overflow:auto;
  padding:10px;
}
#chat-input{
  padding:10px;
  border:none;
  background:#111;
  color:#fff;
}

/* VOICE */
#voiceBtn{
  position:fixed;
  bottom:20px;
  left:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  border:none;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  font-size:22px;
}
</style>
</head>

<body>

<header>
  <div class="logo">Dinesh<span>•</span>Bhairoju</div>
</header>

<canvas id="bg"></canvas>

<section class="hero">
  <h1>Hi, I'm <span>Dinesh Bhairoju</span></h1>
  <p>AI + Digital Marketing + Ecommerce Specialist</p>
</section>

<!-- CHAT BUTTON -->
<button id="chatToggle">💬</button>

<!-- CHATBOX -->
<div id="chatbot">
  <div id="chat-header">🤖 AI Assistant</div>
  <div id="chat-body"></div>
  <input id="chat-input" placeholder="Ask me...">
</div>

<!-- VOICE -->
<button id="voiceBtn">🎤</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>

<script>
/* FIX EARTH */
const canvas=document.getElementById("bg");
const renderer=new THREE.WebGLRenderer({canvas});
renderer.setSize(innerWidth,innerHeight);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,100);
camera.position.z=5;

const sphere=new THREE.Mesh(
  new THREE.SphereGeometry(2,64,64),
  new THREE.MeshStandardMaterial({color:0x8a63f9})
);
scene.add(sphere);

const light=new THREE.PointLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

function animate(){
  requestAnimationFrame(animate);
  sphere.rotation.y+=0.01;
  renderer.render(scene,camera);
}
animate();

/* CHAT TOGGLE */
const toggle=document.getElementById("chatToggle");
const chat=document.getElementById("chatbot");

toggle.onclick=()=>{
  chat.style.display = chat.style.display==="flex" ? "none" : "flex";
};

/* CHAT */
const input=document.getElementById("chat-input");
const body=document.getElementById("chat-body");

input.addEventListener("keydown",async(e)=>{
  if(e.key==="Enter"){
    const msg=input.value;
    body.innerHTML+=`<div>👤 ${msg}</div>`;
    input.value="";

    try{
      const res=await fetch("https://YOUR-RENDER-URL.onrender.com/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:msg})
      });

      const data=await res.json();
      body.innerHTML+=`<div>🤖 ${data.reply}</div>`;
    }catch{
      body.innerHTML+=`<div>⚠️ AI not working</div>`;
    }
  }
});

/* VOICE */
document.getElementById("voiceBtn").onclick=()=>{
  const rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
  rec.onresult=e=>{
    input.value=e.results[0][0].transcript;
    input.dispatchEvent(new KeyboardEvent("keydown",{key:"Enter"}));
  };
  rec.start();
};
</script>

</body>
</html>
