<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinesh Bhairoju — AI Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#8a63f9;
  --accent2:#9b5dff;
}

body{
  margin:0;
  font-family:Poppins;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 30px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(15px);
  border-bottom:1px solid rgba(255,255,255,.1);
}
.logo{
  font-weight:800;
  font-size:22px;
}
.logo span{color:var(--accent)}
nav a{
  margin-left:20px;
  color:#fff;
  text-decoration:none;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}
h1{
  font-size:50px;
}
h1 span{
  background:linear-gradient(90deg,#fff,var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.cta{
  margin-top:20px;
  padding:14px 30px;
  border-radius:30px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 0 30px rgba(155,93,255,.6);
}

/* GLASS CHAT */
#chatbot{
  position:fixed;
  bottom:20px;
  right:20px;
  width:320px;
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(20px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,.2);
  overflow:hidden;
  box-shadow:0 0 40px rgba(155,93,255,.3);
}
#chat-header{
  padding:12px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  font-weight:600;
}
#chat-body{
  height:220px;
  overflow-y:auto;
  padding:10px;
}
.msg-user{color:#ccc;margin:6px 0;}
.msg-bot{color:#9b5dff;margin:6px 0;}
#chat-input{
  width:100%;
  padding:12px;
  background:#000;
  color:#fff;
  border:none;
}

/* VOICE BUTTON */
#voiceBtn{
  position:fixed;
  bottom:20px;
  left:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  border:none;
  font-size:26px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 0 40px rgba(155,93,255,1);
}

/* CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>

<body>

<header>
  <div class="logo">Dinesh<span>•</span>Bhairoju</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Projects</a>
    <a href="#">Contact</a>
  </nav>
</header>

<canvas id="bg"></canvas>

<section class="hero">
  <h1>Hi, I'm <span>Dinesh Bhairoju</span></h1>
  <p>AI + Digital Marketing + Ecommerce Specialist</p>
  <div class="cta">Explore</div>
</section>

<!-- CHAT -->
<div id="chatbot">
  <div id="chat-header">🤖 AI Assistant</div>
  <div id="chat-body"></div>
  <input id="chat-input" placeholder="Ask me anything...">
</div>

<!-- VOICE -->
<button id="voiceBtn">🎤</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>

<script>
/* 3D */
const renderer = new THREE.WebGLRenderer({canvas:bg});
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,100);
camera.position.z = 5;

const sphere = new THREE.Mesh(
  new THREE.SphereGeometry(2,64,64),
  new THREE.MeshStandardMaterial({color:0x8a63f9})
);
scene.add(sphere);

const light = new THREE.PointLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

function animate(){
  requestAnimationFrame(animate);
  sphere.rotation.y+=0.01;
  renderer.render(scene,camera);
}
animate();

/* CHAT */
const input=document.getElementById("chat-input");
const body=document.getElementById("chat-body");

async function sendMessage(msg){
  body.innerHTML+=`<div class="msg-user">👤 ${msg}</div>`;

  try{
    const res=await fetch("https://YOUR-RENDER-URL.onrender.com/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:msg})
    });

    const data=await res.json();
    body.innerHTML+=`<div class="msg-bot">🤖 ${data.reply}</div>`;
    speak(data.reply);

  }catch{
    body.innerHTML+=`<div class="msg-bot">⚠️ Backend not working</div>`;
  }
}

input.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    sendMessage(input.value);
    input.value="";
  }
});

/* VOICE */
function speak(text){
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

document.getElementById("voiceBtn").onclick=()=>{
  const rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
  rec.onresult=e=>{
    sendMessage(e.results[0][0].transcript);
  };
  rec.start();
};
</script>

</body>
</html>
