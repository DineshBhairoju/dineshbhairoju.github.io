<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinesh Bhairoju</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#8a63f9;
  --accent2:#9b5dff;
}

body{
  margin:0;
  font-family:Poppins;
  background:#000;
  color:#fff;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 30px;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(10px);
}
.logo{font-weight:800;font-size:22px;}
.logo span{color:var(--accent)}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* AI BUTTON */
#aiBtn{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  width:70px;
  height:70px;
  border-radius:50%;
  border:none;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 0 30px rgba(155,93,255,.8);
  color:#fff;
  font-size:18px;
}

/* CHAT */
#chatbox{
  position:fixed;
  bottom:110px;
  right:20px;
  width:320px;
  height:450px;
  display:none;
  flex-direction:column;
  background:rgba(0,0,0,.8);
  backdrop-filter:blur(20px);
  border-radius:20px;
}

/* HEADER */
.chat-header{
  padding:12px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  display:flex;
  justify-content:space-between;
}

/* BODY */
#chat-body{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg{
  margin:8px 0;
  padding:10px 14px;
  border-radius:15px;
  max-width:80%;
}
.user{background:#111;margin-left:auto;}
.bot{background:linear-gradient(90deg,var(--accent),var(--accent2));}

/* SUGGESTIONS */
.suggestions{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  padding:10px;
}
.suggestions button{
  background:#111;
  color:#fff;
  border:1px solid #333;
  padding:6px 10px;
  border-radius:10px;
  font-size:12px;
}

/* INPUT */
.chat-input-box{
  display:flex;
  border-top:1px solid #222;
}
#chat-input{
  flex:1;
  padding:12px;
  border:none;
  background:#000;
  color:#fff;
}
#sendBtn{
  width:50px;
  border:none;
  background:var(--accent);
  color:#fff;
}

/* BG */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>

<body>

<header>
  <div class="logo">Dinesh<span>•</span>Bhairoju</div>
</header>

<canvas id="bg"></canvas>

<section class="hero">
  <h1>Hi, I'm Dinesh Bhairoju</h1>
</section>

<button id="aiBtn">AI</button>

<div id="chatbox">
  <div class="chat-header">
    Dinesh AI
    <span id="closeChat">✖</span>
  </div>

  <div id="chat-body"></div>

  <!-- SUGGESTIONS -->
  <div class="suggestions">
    <button onclick="quickMsg('skills')">Skills</button>
    <button onclick="quickMsg('education')">Education</button>
    <button onclick="quickMsg('resume')">Resume</button>
    <button onclick="quickMsg('email')">Email</button>
  </div>

  <div class="chat-input-box">
    <input id="chat-input" placeholder="Ask me anything...">
    <button id="sendBtn">➤</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>

<script>
/* 3D */
const renderer = new THREE.WebGLRenderer({canvas:bg, alpha:true});
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 6;

const sphere = new THREE.Mesh(
  new THREE.SphereGeometry(1.8,64,64),
  new THREE.MeshStandardMaterial({color:0x8a63f9})
);
scene.add(sphere);

const light = new THREE.PointLight(0xffffff,1.2);
light.position.set(5,5,5);
scene.add(light);

function animate(){
  requestAnimationFrame(animate);
  sphere.rotation.y += 0.005;
  renderer.render(scene, camera);
}
animate();

/* CHAT */
const aiBtn = document.getElementById("aiBtn");
const chatbox = document.getElementById("chatbox");
const closeChat = document.getElementById("closeChat");
const input = document.getElementById("chat-input");
const body = document.getElementById("chat-body");

aiBtn.onclick = ()=> chatbox.style.display="flex";
closeChat.onclick = ()=> chatbox.style.display="none";

/* ADD MESSAGE */
function addMessage(text, cls){
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerHTML = text;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

/* QUICK BUTTON */
function quickMsg(text){
  sendMessage(text);
}

/* AI LOGIC */
function reply(msg){
  msg = msg.toLowerCase();

  if(msg.includes("skills"))
    return "Skills:<br>AI, Digital Marketing, Ecommerce, Web Development";

  if(msg.includes("education"))
    return "Education:<br>Bachelor's Degree (update with your details)";

  if(msg.includes("resume"))
    return 'Download Resume:<br><a href="resume.pdf" target="_blank" style="color:#fff;">Open Resume</a>';

  if(msg.includes("email"))
    return 'Contact Email:<br><a href="mailto:your@email.com" style="color:#fff;">your@email.com</a>';

  if(msg.includes("hi"))
    return "Hello. How can I help you?";

  return "Please tell me more.";
}

/* SEND */
function sendMessage(msgInput){
  const msg = msgInput || input.value;
  if(!msg) return;

  addMessage(msg,"user");
  input.value="";

  setTimeout(()=>{
    const res = reply(msg);
    addMessage(res,"bot");
    speak(res.replace(/<[^>]*>/g, ""));
  },400);
}

document.getElementById("sendBtn").onclick = ()=> sendMessage();

input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter") sendMessage();
});

/* SPEAK */
function speak(text){
  const speech = new SpeechSynthesisUtterance(text);
  speech.rate = 1;
  speechSynthesis.speak(speech);
}

/* INTRO */
window.onload = ()=>{
  addMessage("Hello. I am Dinesh AI. Ask me anything.","bot");
};
</script>

</body>
</html>
