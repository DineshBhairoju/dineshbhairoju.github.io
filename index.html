<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinesh Bhairoju — AI Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#8a63f9;
  --accent2:#9b5dff;
}
body{
  margin:0;
  font-family:Poppins;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}
header{
  position:fixed;top:0;width:100%;
  display:flex;justify-content:space-between;
  padding:20px;background:rgba(0,0,0,.6);
  backdrop-filter:blur(10px);
}
nav a{color:#fff;margin-left:20px;text-decoration:none}
.hero{
  height:100vh;display:flex;flex-direction:column;
  justify-content:center;align-items:center;text-align:center;
}
h1 span{color:var(--accent)}
.cta{
  padding:12px 25px;border-radius:30px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:#fff;text-decoration:none;
}
#chatbot{
  position:fixed;bottom:20px;right:20px;width:300px;
  background:rgba(0,0,0,.85);border-radius:16px;
  border:1px solid rgba(255,255,255,.2);
}
#chat-body{height:200px;overflow-y:auto;padding:10px}
#chat-input{width:100%;padding:10px;background:#111;color:#fff;border:none}
#voiceBtn{
  position:fixed;bottom:20px;left:20px;
  width:60px;height:60px;border-radius:50%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:#fff;border:none;font-size:20px;
}
canvas{position:fixed;top:0;left:0;z-index:-1}
</style>
</head>

<body>

<header>
  <div><b>Dinesh<span style="color:#8a63f9">•</span>Bhairoju</b></div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Projects</a>
    <a href="#">Contact</a>
  </nav>
</header>

<canvas id="bg"></canvas>

<section class="hero">
  <h1>Hi, I'm <span>Dinesh</span></h1>
  <p>AI + Digital Marketing + Ecommerce Specialist</p>
  <a href="#" class="cta">Explore</a>
</section>

<!-- Chatbot -->
<div id="chatbot">
  <div style="padding:10px;background:linear-gradient(90deg,#8a63f9,#9b5dff)">AI Assistant</div>
  <div id="chat-body"></div>
  <input id="chat-input" placeholder="Ask me anything...">
</div>

<!-- Voice -->
<button id="voiceBtn">🎤</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>

<script>
/* ================= 3D ================= */
const canvas = document.getElementById('bg');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 5;

const light = new THREE.PointLight(0xffffff,1);
light.position.set(5,5,5);
scene.add(light);

/* Globe */
const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1.5,64,64),
  new THREE.MeshStandardMaterial({color:0x8a63f9})
);
scene.add(earth);

/* Particles */
const particlesGeometry = new THREE.BufferGeometry();
const count = 1500;
const positions = new Float32Array(count * 3);
for(let i=0;i<count*3;i++){
  positions[i] = (Math.random()-0.5)*20;
}
particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions,3));
const particles = new THREE.Points(particlesGeometry,new THREE.PointsMaterial({size:0.02}));
scene.add(particles);

let mouseX=0, mouseY=0;
document.addEventListener("mousemove",(e)=>{
  mouseX=(e.clientX/window.innerWidth-0.5);
  mouseY=(e.clientY/window.innerHeight-0.5);
});

function animate(){
  requestAnimationFrame(animate);
  earth.rotation.y+=0.01;
  earth.rotation.x+=mouseY*0.02;
  earth.rotation.y+=mouseX*0.02;
  particles.rotation.y+=0.001;
  renderer.render(scene,camera);
}
animate();

/* ================= AI CHAT ================= */
const input = document.getElementById("chat-input");
const body = document.getElementById("chat-body");

async function sendMessage(msg){
  body.innerHTML += `<div>👤 ${msg}</div>`;
  
  const res = await fetch("https://your-backend.onrender.com/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({message: msg})
  });

  const data = await res.json();

  body.innerHTML += `<div>🤖 ${data.reply}</div>`;
  body.scrollTop = body.scrollHeight;

  speak(data.reply);
}

input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    sendMessage(input.value);
    input.value="";
  }
});

/* ================= VOICE ================= */
function speak(text){
  const speech = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(speech);
}

document.getElementById("voiceBtn").onclick=()=>{
  const recognition = new (window.SpeechRecognition||window.webkitSpeechRecognition)();

  recognition.onresult = async (event)=>{
    const text = event.results[0][0].transcript;
    sendMessage(text);
  };

  recognition.start();
};
</script>

</body>
</html>
