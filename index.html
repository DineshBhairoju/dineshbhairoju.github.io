<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinesh Bhairoju</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#8a63f9;
  --accent2:#9b5dff;
}

body{
  margin:0;
  font-family:Poppins;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 30px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(10px);
  z-index:10;
}
.logo{font-weight:800;font-size:22px;}
.logo span{color:var(--accent)}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}
h1{
  font-size:clamp(32px,6vw,60px);
}
h1 span{
  background:linear-gradient(90deg,#fff,var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.sub{color:#ccc;margin:15px 0}

/* BUTTONS */
.btn{
  position:fixed;
  width:65px;
  height:65px;
  border-radius:50%;
  border:none;
  font-size:22px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 0 25px rgba(155,93,255,.8);
  cursor:pointer;
  transition:.3s;
}
.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 40px rgba(155,93,255,1);
}
#voiceBtn{left:20px;bottom:20px;}
#chatBtn{right:20px;bottom:20px;}

/* CHAT */
#chatbox{
  position:fixed;
  bottom:100px;
  right:20px;
  width:320px;
  height:420px;
  display:none;
  flex-direction:column;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(20px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,.2);
  overflow:hidden;
}

/* HEADER */
.chat-header{
  padding:12px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  font-weight:600;
  display:flex;
  justify-content:space-between;
}

/* BODY */
#chat-body{
  flex:1;
  overflow-y:auto;
  padding:10px;
  font-size:14px;
}

.msg{
  margin:8px 0;
  padding:10px 14px;
  border-radius:15px;
  max-width:80%;
  animation:fade .3s ease;
}

.user{
  background:#111;
  margin-left:auto;
}

.bot{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}

/* typing dots */
.typing{
  display:inline-block;
}
.typing span{
  animation:blink 1.4s infinite;
}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

@keyframes blink{
  0%,80%,100%{opacity:0}
  40%{opacity:1}
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* INPUT */
#chat-input{
  padding:12px;
  border:none;
  background:#000;
  color:#fff;
  outline:none;
}

/* BG */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>

<body>

<header>
  <div class="logo">Dinesh<span>•</span>Bhairoju</div>
</header>

<canvas id="bg"></canvas>

<section class="hero">
  <h1>Hi, I'm <span>Dinesh Bhairoju</span></h1>
  <p class="sub">AI + Digital Marketing + Ecommerce Specialist</p>
</section>

<button id="voiceBtn" class="btn">🎤</button>
<button id="chatBtn" class="btn">💬</button>

<div id="chatbox">
  <div class="chat-header">
    🤖 Dinesh AI
    <span id="closeChat">✖</span>
  </div>
  <div id="chat-body"></div>
  <input id="chat-input" placeholder="Ask me anything...">
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>

<script>
/* ===== 3D ===== */
const renderer = new THREE.WebGLRenderer({canvas:bg, alpha:true});
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 6;

const sphere = new THREE.Mesh(
  new THREE.SphereGeometry(1.8,64,64),
  new THREE.MeshStandardMaterial({color:0x8a63f9})
);
scene.add(sphere);

const light = new THREE.PointLight(0xffffff,1.2);
light.position.set(5,5,5);
scene.add(light);

function animate(){
  requestAnimationFrame(animate);
  sphere.rotation.y += 0.005;
  sphere.position.y = Math.sin(Date.now()*0.001)*0.3;
  renderer.render(scene, camera);
}
animate();

/* ===== CHAT ===== */
const chatBtn = document.getElementById("chatBtn");
const chatbox = document.getElementById("chatbox");
const closeChat = document.getElementById("closeChat");
const input = document.getElementById("chat-input");
const body = document.getElementById("chat-body");

chatBtn.onclick = ()=> chatbox.style.display="flex";
closeChat.onclick = ()=> chatbox.style.display="none";

/* ===== MEMORY ===== */
let history = JSON.parse(localStorage.getItem("chatHistory")) || [];

function saveMemory(){
  localStorage.setItem("chatHistory", JSON.stringify(history));
}

/* ===== TYPE EFFECT ===== */
function typeEffect(el, text){
  let i = 0;
  el.innerHTML = "";

  const interval = setInterval(()=>{
    const char = text[i];
    if(char === "\n") el.innerHTML += "<br>";
    else el.innerHTML += char;

    i++;
    if(i >= text.length) clearInterval(interval);
  }, 15);
}

/* ===== ADD MESSAGE ===== */
function addMessage(text, cls, typing=false){
  const div = document.createElement("div");
  div.className = "msg " + cls;

  if(typing){
    div.innerHTML = '<div class="typing"><span>.</span><span>.</span><span>.</span></div>';
  }else{
    typeEffect(div, text);
  }

  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
  return div;
}

/* ===== FAKE AI (FREE) ===== */
function smartReply(msg){
  msg = msg.toLowerCase();

  if(msg.includes("who") || msg.includes("dinesh"))
    return "Dinesh Bhairoju is an AI + Digital Marketing + Ecommerce Specialist 🚀";

  if(msg.includes("hi") || msg.includes("hello"))
    return "Hey 👋 How can I help you today?";

  if(msg.includes("skills"))
    return "I can help with AI, marketing, websites, and automation 💡";

  return "That's interesting 👀 tell me more!";
}

/* ===== SEND ===== */
async function sendMessage(msg){
  if(!msg) return;

  addMessage(msg, "user");
  history.push({role:"user",msg});
  saveMemory();

  const typing = addMessage("", "bot", true);

  setTimeout(()=>{
    const reply = smartReply(msg);
    typing.remove();

    const botMsg = addMessage(reply, "bot");
    history.push({role:"bot",msg:reply});
    saveMemory();

    speak(reply);

  },1000);
}

input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    sendMessage(input.value);
    input.value="";
  }
});

/* ===== VOICE ===== */
function speak(text){
  const speech = new SpeechSynthesisUtterance(text);
  speech.rate = 1;
  speechSynthesis.speak(speech);
}

document.getElementById("voiceBtn").onclick = ()=>{
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.onresult = (e)=>{
    sendMessage(e.results[0][0].transcript);
  };
  recognition.start();
};

/* ===== INTRO ===== */
window.onload = ()=>{
  const intro = "Hey 👋\nI'm Dinesh Bhairoju's AI assistant.\nI can help you explore skills, projects, and ideas 🚀";
  addMessage(intro, "bot");
};
</script>

</body>
</html>
