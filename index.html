<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinesh Bhairoju</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#8a63f9;
  --accent2:#9b5dff;
}

body{
  margin:0;
  font-family:Poppins;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:20px;
  font-weight:800;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(10px);
  z-index:10;
}
header span{color:var(--accent)}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* PROFILE */
.profile{
  width:130px;
  height:130px;
  border-radius:50%;
  border:3px solid var(--accent);
  box-shadow:0 0 30px rgba(155,93,255,.9);
  margin-bottom:20px;
}

/* TEXT */
.hero h1{
  font-size:34px;
  margin:10px 0;
}
.hero p{
  color:#aaa;
}

/* SOCIAL */
.social{
  margin-top:20px;
  display:flex;
  gap:12px;
}
.social a{
  padding:10px 18px;
  border-radius:25px;
  background:#111;
  color:#fff;
  text-decoration:none;
  transition:.3s;
}
.social a:hover{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}

/* AI BUTTON */
#aiBtn{
  position:absolute;
  bottom:80px;
  width:80px;
  height:80px;
  border-radius:50%;
  border:none;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:#fff;
  font-size:20px;
  cursor:pointer;

  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(155,93,255,.7)}
  70%{box-shadow:0 0 0 30px rgba(155,93,255,0)}
  100%{box-shadow:0 0 0 0 rgba(155,93,255,0)}
}

/* BACKGROUND BLOBS */
.blob{
  position:absolute;
  width:400px;
  height:400px;
  background:linear-gradient(120deg,#8a63f9,#9b5dff);
  border-radius:50%;
  filter:blur(100px);
  opacity:.5;
  animation:move 10s infinite alternate;
}

.blob1{top:10%;left:10%;}
.blob2{bottom:10%;right:10%;animation-delay:3s;}

@keyframes move{
  0%{transform:translate(0,0) scale(1);}
  100%{transform:translate(50px,-50px) scale(1.2);}
}

/* CHAT */
#chatbox{
  position:fixed;
  bottom:120px;
  right:20px;
  width:320px;
  height:420px;
  display:none;
  flex-direction:column;
  background:rgba(0,0,0,.8);
  backdrop-filter:blur(20px);
  border-radius:20px;
}

.chat-header{
  padding:12px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  display:flex;
  justify-content:space-between;
}

#chat-body{
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.user{
  background:#111;
  padding:10px;
  border-radius:10px;
  margin:5px 0;
}
.bot{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  padding:10px;
  border-radius:10px;
  margin:5px 0;
}

.chat-input-box{
  display:flex;
}
#chat-input{
  flex:1;
  padding:10px;
  background:#000;
  border:none;
  color:#fff;
}
#sendBtn{
  width:60px;
  background:var(--accent);
  border:none;
  color:#fff;
}
</style>
</head>

<body>

<header>Dinesh<span>•</span>Bhairoju</header>

<!-- BACKGROUND -->
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<section class="hero">

  <img src="dinesh.jpg" class="profile">

  <h1>Hi, I'm Dinesh Bhairoju</h1>
  <p>AI • Digital Marketing • Ecommerce</p>

  <div class="social">
    <a href="https://youtube.com/@dineshbhairoju" target="_blank">YouTube</a>
    <a href="https://www.linkedin.com/in/dineshbhairoju" target="_blank">LinkedIn</a>
  </div>

  <button id="aiBtn">AI</button>

</section>

<!-- CHAT -->
<div id="chatbox">
  <div class="chat-header">
    Dinesh Bhairoju AI Assistant
    <span onclick="chatbox.style.display='none'">✖</span>
  </div>

  <div id="chat-body"></div>

  <div class="chat-input-box">
    <input id="chat-input" placeholder="Ask me anything...">
    <button id="sendBtn">➤</button>
  </div>
</div>

<script>
const chatbox=document.getElementById("chatbox");
const body=document.getElementById("chat-body");
const input=document.getElementById("chat-input");

document.getElementById("aiBtn").onclick=()=>chatbox.style.display="flex";

function sendMessage(msg){
 if(!msg)return;

 body.innerHTML+=`<div class="user">${msg}</div>`;

 let reply=getReply(msg);

 let bot=document.createElement("div");
 bot.className="bot";
 body.appendChild(bot);

 let i=0;
 let typing=setInterval(()=>{
  bot.textContent+=reply[i];
  i++;
  if(i>=reply.length)clearInterval(typing);
 },20);

 speak(reply);
 input.value="";
 body.scrollTop=body.scrollHeight;
}

function getReply(msg){
 msg=msg.toLowerCase();

 if(msg.includes("hi")) return "Hello, how can I help you?";
 if(msg.includes("skills")) return "AI, Digital Marketing, Ecommerce";
 if(msg.includes("who")) return "Dinesh Bhairoju is an AI and Digital Marketing specialist.";

 return "Tell me more.";
}

document.getElementById("sendBtn").onclick=()=>sendMessage(input.value);
input.addEventListener("keydown",(e)=>{
 if(e.key==="Enter")sendMessage(input.value);
});

function speak(text){
 let s=new SpeechSynthesisUtterance(text);
 speechSynthesis.speak(s);
}
</script>

</body>
</html>
