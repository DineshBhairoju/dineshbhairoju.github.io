<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinesh Bhairoju</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#8a63f9;
  --accent2:#9b5dff;
}

body{
  margin:0;
  font-family:Poppins;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 30px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(10px);
  z-index:10;
}
.logo{font-weight:800;font-size:22px;}
.logo span{color:var(--accent)}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}
h1{
  font-size:clamp(32px,6vw,60px);
}
h1 span{
  background:linear-gradient(90deg,#fff,var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.sub{color:#ccc;margin:15px 0}
.cta{
  padding:14px 30px;
  border-radius:40px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 0 25px rgba(155,93,255,.5);
}

/* BUTTONS */
.btn{
  position:fixed;
  width:65px;
  height:65px;
  border-radius:50%;
  border:none;
  font-size:22px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 0 25px rgba(155,93,255,.8);
  cursor:pointer;
  transition:.3s;
}
.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 40px rgba(155,93,255,1);
}
#voiceBtn{left:20px;bottom:20px;}
#chatBtn{right:20px;bottom:20px;}

/* CHATBOX */
#chatbox{
  position:fixed;
  bottom:100px;
  right:20px;
  width:320px;
  height:420px;
  display:none;
  flex-direction:column;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(20px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,.2);
  overflow:hidden;
  z-index:20;
  animation:fadeIn .3s ease;
}

/* HEADER */
.chat-header{
  padding:12px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  display:flex;
  justify-content:space-between;
}

/* BODY */
#chat-body{
  flex:1;
  overflow-y:auto;
  padding:10px;
  font-size:14px;
}

/* MESSAGES */
.msg{
  padding:10px 14px;
  border-radius:16px;
  margin:6px 0;
  max-width:80%;
  transition:.3s;
}

.user{
  background:#111;
  margin-left:auto;
}

.bot{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}

.msg:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(155,93,255,.6);
}

/* INPUT */
#chat-input{
  padding:12px;
  border:none;
  background:#000;
  color:#fff;
  outline:none;
}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>

<body>

<header>
  <div class="logo">Dinesh<span>•</span>Bhairoju</div>
</header>

<canvas id="bg"></canvas>

<section class="hero">
  <h1>Hi, I'm <span>Dinesh Bhairoju</span></h1>
  <p class="sub">AI + Digital Marketing + Ecommerce Specialist</p>
  <div class="cta">Explore</div>
</section>

<button id="voiceBtn" class="btn">🎤</button>
<button id="chatBtn" class="btn">💬</button>

<div id="chatbox">
  <div class="chat-header">
    🤖 Assistant
    <span id="closeChat" style="cursor:pointer">✖</span>
  </div>
  <div id="chat-body"></div>
  <input id="chat-input" placeholder="Ask me anything...">
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>

<script>
/* ===== 3D ===== */
const renderer = new THREE.WebGLRenderer({canvas:bg, alpha:true});
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 6;

const sphere = new THREE.Mesh(
  new THREE.SphereGeometry(1.8,64,64),
  new THREE.MeshStandardMaterial({color:0x8a63f9})
);
scene.add(sphere);

const light = new THREE.PointLight(0xffffff,1.2);
light.position.set(5,5,5);
scene.add(light);

function animate(){
  requestAnimationFrame(animate);
  sphere.rotation.y += 0.005;
  sphere.position.y = Math.sin(Date.now()*0.001)*0.3;
  renderer.render(scene, camera);
}
animate();

/* ===== CHAT ===== */
const chatBtn = document.getElementById("chatBtn");
const chatbox = document.getElementById("chatbox");
const closeChat = document.getElementById("closeChat");
const input = document.getElementById("chat-input");
const body = document.getElementById("chat-body");

chatBtn.onclick = ()=> chatbox.style.display="flex";
closeChat.onclick = ()=> chatbox.style.display="none";

let memory = [];

function addMsg(text,type){
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function typeEffect(element,text){
  let i=0;
  const interval = setInterval(()=>{
    element.innerText += text.charAt(i);
    i++;
    if(i>=text.length) clearInterval(interval);
  },20);
}

function smartReply(text){
  text = text.toLowerCase();

  if(text.includes("hi")) return "Hey 👋 I'm Dinesh's AI assistant!";
  if(text.includes("who are you")) return "I'm a smart AI assistant built into this portfolio 🚀";
  if(text.includes("dinesh")) return "Dinesh Bhairoju is an AI + Ecommerce + Digital Marketing specialist 💡";
  if(text.includes("skills")) return "SEO, Ads, Ecommerce scaling, and AI automation 🔥";

  if(memory.length > 2){
    return "I see you're interested 👀 tell me more!";
  }

  return "That's interesting 👀 tell me more!";
}

input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    const text = input.value;
    if(!text) return;

    addMsg(text,"user");
    memory.push(text);
    input.value="";

    const typing = document.createElement("div");
    typing.className="msg bot";
    typing.innerText="Typing...";
    body.appendChild(typing);

    setTimeout(()=>{
      typing.remove();

      const reply = smartReply(text);

      const botDiv = document.createElement("div");
      botDiv.className="msg bot";
      body.appendChild(botDiv);

      typeEffect(botDiv, reply);
      speak(reply);

      memory.push(reply);
    },800);
  }
});

/* ===== VOICE ===== */
function speak(text){
  const speech = new SpeechSynthesisUtterance(text);
  speech.rate = 1;
  speech.pitch = 1;
  speechSynthesis.speak(speech);
}

document.getElementById("voiceBtn").onclick = ()=>{
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

  recognition.onresult = (event)=>{
    const text = event.results[0][0].transcript;
    addMsg(text,"user");

    const reply = smartReply(text);

    const botDiv = document.createElement("div");
    botDiv.className="msg bot";
    body.appendChild(botDiv);

    typeEffect(botDiv, reply);
    speak(reply);
  };

  recognition.start();
};
</script>

</body>
</html>
