<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinesh Bhairoju</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --accent:#8a63f9;
  --accent2:#9b5dff;
}

body{
  margin:0;
  font-family:Poppins;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:20px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(10px);
  z-index:10;
}
.logo{
  font-weight:800;
  font-size:22px;
}
.logo span{color:var(--accent)}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:0 20px;
}

h1{
  font-size:clamp(32px,6vw,64px);
  margin-bottom:10px;
}
h1 span{
  background:linear-gradient(90deg,#fff,var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sub{
  color:#ccc;
  margin-bottom:25px;
  max-width:500px;
}

/* BUTTON */
.cta{
  padding:14px 30px;
  border-radius:40px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 0 25px rgba(155,93,255,.5);
  cursor:pointer;
  transition:.3s;
}
.cta:hover{
  transform:scale(1.05);
}

/* FLOAT BUTTONS */
.btn{
  position:fixed;
  width:65px;
  height:65px;
  border-radius:50%;
  border:none;
  font-size:22px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 0 25px rgba(155,93,255,.8);
}
#voiceBtn{left:20px;bottom:20px;}
#chatBtn{right:20px;bottom:20px;}

/* CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>
</head>

<body>

<header>
  <div class="logo">Dinesh<span>•</span>Bhairoju</div>
</header>

<canvas id="bg"></canvas>

<section class="hero">
  <h1>Hi, I'm <span>Dinesh Bhairoju</span></h1>
  <p class="sub">AI + Digital Marketing + Ecommerce Specialist</p>
  <div class="cta">Explore</div>
</section>

<button id="voiceBtn" class="btn">🎤</button>
<button id="chatBtn" class="btn">💬</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>

<script>
/* PERFECT 3D FIX */
const canvas = document.getElementById("bg");
const renderer = new THREE.WebGLRenderer({canvas, alpha:true});
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 6;

/* SMALLER SPHERE */
const sphere = new THREE.Mesh(
  new THREE.SphereGeometry(1.8,64,64),
  new THREE.MeshStandardMaterial({color:0x8a63f9})
);
sphere.position.y = 0.5;
scene.add(sphere);

/* LIGHT */
const light = new THREE.PointLight(0xffffff,1.2);
light.position.set(5,5,5);
scene.add(light);

/* ANIMATION */
function animate(){
  requestAnimationFrame(animate);

  sphere.rotation.y += 0.005;
  sphere.position.y = Math.sin(Date.now()*0.001)*0.3;

  renderer.render(scene, camera);
}
animate();

/* RESPONSIVE */
addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
